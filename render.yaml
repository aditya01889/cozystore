# Render Staging Configuration for Cozy Cat Kitchen
# Deploys from the staging branch
services:
  - type: web
    name: cozy-cat-staging
    env: docker
    plan: free
    region: oregon
    branch: staging
    envVars:
      - key: NODE_ENV
        value: staging
      - key: DATABASE_URL
        fromDatabase:
          name: cozy-cat-staging-db
          property: connectionString
      - key: PORT
        value: 3000
    autoDeploy: true
    healthCheckPath: /

databases:
  - name: cozy-cat-staging-db
    databaseName: cozycatstaging
    user: cozycatuser
    plan: free
    region: oregon  # Should match the web service region
