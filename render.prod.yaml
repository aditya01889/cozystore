# Render Production Configuration for Cozy Cat Kitchen
# Deploys from the main branch
services:
  - type: web
    name: cozy-cat-kitchen
    dockerfile: Dockerfile
    plan: free
    region: oregon
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cozy-cat-prod-db
          property: connectionString
      - key: PORT
        value: 3000
    autoDeploy: true
    healthCheckPath: /

databases:
  - name: cozy-cat-prod-db
    databaseName: cozycatprod
    user: cozycatuser
    plan: free
    region: oregon  # Should match the web service region
