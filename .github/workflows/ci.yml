name: CI Pipeline

on:
  push:
    branches:
      - 'feature/*'
      - 'bugfix/*'
      - 'release/*'
  pull_request:
    branches:
      - develop
      - staging
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linter
      run: npm run lint --if-present
    
    - name: Build project
      run: npm run build
    
    - name: Run tests
      run: npm test --if-present
